<!-- 3) შექმენი სრულყოფილი სარეგისტრაციო ველი სადაც გექნებ name,lastname,email,password და submit ღილაკი. -->



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 <form>
  <label for="name"> name: </label>
  <input type="text" id="name" name="name" required placeholder="please enter your name" >
  <br>
  
  <label for="last_name"> lastname: </label>
  <input type="text" id="last_name" name="last_name" required placeholder="please enter your lastname" >
  <br>
  
  <label for="email"> email: </label>
  <input type="email" id="email" name="email" required placeholder="please enter your email">
  <br>
  
  <label for="password"> password: </label>
  <input type="password" id="password" name="password" required placeholder="please enter your password" >
  <button type="submit"> submit </button>
</form>
    
</body>
</html>
