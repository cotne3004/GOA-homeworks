<!-- 3) შექმენი დიდი სარეგისტრაციო ველი სადაც გექნება name,lastname,tel,password,email,date,image,range,checkbox და ყველას გაუკეთე placeholder და required და ბოლოხ submit ღილაკი. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <form>
  <label for="name"> name: </label>
  <input type="text" id="name" name="name" required placeholder="please enter your name" >
  <br>
  
  <label for="last_name"> lastname: </label>
  <input type="text" id="last_name" name="last_name" required placeholder="please enter your lastname" >
  <br>

  <label for="number"> number: </label>
  <input type="number" id="number" name="number" required placeholder="please enter your tel number">
  <br>

  <label for="password"> password: </label>
  <input type="password" id="password" name="password" required placeholder="please enter your password" >
  <br>

  <label for="email"> email: </label>
  <input type="email" id="email" name="email" required placeholder="please enter your email">
  <br>

  <label for="date"> date: </label>
  <input type="date" id="date" name="date" required placeholder="please enter your date">
  <br>

  <label for="image"> image: </label>
  <input type="file" id="image" name="image" required placeholder="please upload image here">
  <br>

  <label for="range"> range: </label>
  <input type="range" id="range" name="range" required placeholder="please enter range">
  <br>

  <label for="checkbox"> checkbox: </label>
  <input type="checkbox" id="checkbox" name="checkbox" required placeholder="please enter your checkbox">
  <br>

  <button type="submit"> submit </button>
</form>
</body>
</html>
