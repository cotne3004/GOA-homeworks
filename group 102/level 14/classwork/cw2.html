<!-- 2) შექმენით საიტი სადაც გექნებათ ჩასმული 2 ვიდეო, ორივეს გაუწერეთ აუცილებლად controls ატრიბუტი და ასევე კიდევ ერთი დამატებითი
  ატრიბუტი თქვენი სურვილით. ასევე აუცილებლად ახსენით კომენტარების სახით შემდეგი ატრიბუტები: controls, autoplay, muted და loop -->
  
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <video controls autoplay loop>
        <source src="">
        <source src="">
    </video>
</body>
</html>

<!-- controls არის ატრიბუტი რომელიც გვაძლევს უფლებას რომ ვაკონტროლოთ ვიდეო ჩვენივე საიტზე, autoplay არის ასევე ატრიბუტი როცა სააიტს გავსხნით თავისით უშვებს ვიდეოს
 muted როცა ვიდეო დაიწყება აუტოფლეისთან ერთად ვიდეოს გათიშული ექნება ხმა loop  ნიშნავს რომ როცა ვიდეო დასრულდება თავისით გაიშვება ახლიდან -->
