<!-- 1) გამოიყენეთ ყველა ფორმატირების თეგები (<b></b>, <i></i>, <u></u>, <strong></strong> და <em></em>) ასევე კომენტარებით ახსენით რას ნიშნავს სემანტიკური თეგი. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><b>hello world</b></p>
    <p><i>hello world</i></p>
    <p><u>hello world</u></p>
    <p><strong>hello world</strong></p>
    <p><em>hello world</em></p>
</body>
</html>
